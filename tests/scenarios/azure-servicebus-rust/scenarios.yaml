# yaml-language-server: $schema=../skill-scenarios.schema.json
# Test scenarios for azure-servicebus-rust skill evaluation
# Each scenario tests a specific usage pattern against acceptance criteria

config:
  model: claude-sonnet-4.6
  max_tokens: 2000
  temperature: 0.3

scenarios:
  - name: dependency_gate_cargo_add
    prompt: |
      For a Rust Azure Service Bus example, explain dependency management rules.
    expected_patterns:
      - "cargo add"
      - "Cargo.toml"
      - "azure_core"
    forbidden_patterns:
      - "edit Cargo.toml manually"
    tags:
      - dependency
      - guardrail
    mock_response: |
      Use cargo commands for dependency changes, for example:
      cargo add azure_messaging_servicebus azure_identity tokio
      Add azure_core only when importing azure_core types directly.
      Do not manually edit Cargo.toml in generated guidance.

  - name: create_servicebus_client
    prompt: |
      Create a ServiceBusClient in Rust using DeveloperToolsCredential.
    expected_patterns:
      - "ServiceBusClient"
      - "builder"
      - "open"
      - "DeveloperToolsCredential"
      - "servicebus.windows.net"
    forbidden_patterns:
      - "ServiceBusClient::new"
    tags:
      - basic
      - authentication
    mock_response: |
      use azure_identity::DeveloperToolsCredential;
      use azure_messaging_servicebus::ServiceBusClient;

      let credential = DeveloperToolsCredential::new(None)?;
      let client = ServiceBusClient::builder()
          .open("your_namespace.servicebus.windows.net", credential.clone())
          .await?;

  - name: send_queue_message
    prompt: |
      Send a message to a Service Bus queue in Rust.
    expected_patterns:
      - "create_sender"
      - "Message::from"
      - "send_message"
    forbidden_patterns:
      - "receive_messages"
    tags:
      - send
      - queue
    mock_response: |
      use azure_messaging_servicebus::Message;

      let sender = client.create_sender("my_queue", None).await?;
      let message = Message::from("Hello, Service Bus!");
      sender.send_message(message, None).await?;

  - name: receive_and_complete_queue_messages
    prompt: |
      Receive queue messages and settle them correctly with complete_message.
    expected_patterns:
      - "create_receiver"
      - "receive_messages"
      - "complete_message"
    tags:
      - receive
      - settlement
      - queue
    mock_response: |
      let receiver = client.create_receiver("my_queue", None).await?;
      let messages = receiver.receive_messages(5, None).await?;
      for message in messages {
          println!("Received: {}", message.body_as_string()?);
          receiver.complete_message(&message, None).await?;
      }

  - name: receive_subscription_messages
    prompt: |
      Receive messages from a topic subscription in Rust Service Bus.
    expected_patterns:
      - "create_receiver_for_subscription"
      - "receive_messages"
      - "complete_message"
    forbidden_patterns:
      - "create_sender"
    tags:
      - topic
      - subscription
      - receive
    mock_response: |
      let receiver = client
          .create_receiver_for_subscription("my_topic", "my_subscription", None)
          .await?;

      let messages = receiver.receive_messages(5, None).await?;
      for message in messages {
          receiver.complete_message(&message, None).await?;
      }

  - name: package_maturity_warning
    prompt: |
      What production caution should be included when using azure_messaging_servicebus in Rust?
    expected_patterns:
      - "early development"
      - "should not be used in production"
    forbidden_patterns:
      - "production-ready"
    tags:
      - warning
      - maturity
    mock_response: |
      This crate is in early development and should not be used in production without caution, because APIs may change.
