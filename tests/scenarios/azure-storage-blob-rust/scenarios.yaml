# yaml-language-server: $schema=../skill-scenarios.schema.json
# Test scenarios for azure-storage-blob-rust skill evaluation
# Each scenario tests a specific usage pattern against acceptance criteria

config:
  model: claude-sonnet-4.6
  max_tokens: 2000
  temperature: 0.3

scenarios:
  - name: create_blob_client
    prompt: |
      Create a BlobClient in Rust using DeveloperToolsCredential for 
      Microsoft Entra ID authentication.
    expected_patterns:
      - "DeveloperToolsCredential"
      - "BlobServiceClient"
      - "blob.core.windows.net"
    forbidden_patterns:
      - "connection_string"
      - "account_key"
      - "azure_storage_blobs"
    tags:
      - basic
      - authentication
    mock_response: |
      use azure_core::http::Url;
      use azure_identity::DeveloperToolsCredential;
      use azure_storage_blob::BlobServiceClient;

      let credential = DeveloperToolsCredential::new(None)?;
      let service_url = Url::parse("https://<account>.blob.core.windows.net/")?;
      let service_client = BlobServiceClient::new(
          service_url,
          Some(credential),
          None,
      )?;
      let blob_client = service_client.blob_client("container-name", "blob-name");

  - name: upload_blob
    prompt: |
      Upload data to a blob in Azure Storage using Rust.
    expected_patterns:
      - "upload"
      - "RequestContent"
    forbidden_patterns:
      - "download"
      - "azure_storage_blobs"
    tags:
      - upload
      - write
    mock_response: |
      use azure_core::http::RequestContent;

      let data = b"hello world";
      blob_client
        .upload(RequestContent::from(data.to_vec()), None)
          .await?;

  - name: download_blob
    prompt: |
      Download a blob from Azure Storage and get its content as bytes.
    expected_patterns:
      - "download"
      - "body"
      - "collect"
    forbidden_patterns:
      - "upload"
      - "azure_storage_blobs"
    tags:
      - download
      - read
    mock_response: |
      let response = blob_client.download(None).await?;
      let content = response.body.collect().await?;
      println!("Content: {:?}", content);

  - name: get_blob_properties
    prompt: |
      Get the properties of a blob in Azure Storage using Rust.
    expected_patterns:
      - "get_properties"
    forbidden_patterns:
      - "set_properties"
      - "azure_storage_blobs"
    tags:
      - properties
      - metadata
    mock_response: |
      let properties = blob_client.get_properties(None).await?;
      println!("Content-Length: {:?}", properties.content_length);

  - name: delete_blob
    prompt: |
      Delete a blob from Azure Storage using the Rust SDK.
    expected_patterns:
      - "delete"
    forbidden_patterns:
      - "create"
      - "azure_storage_blobs"
    tags:
      - delete
    mock_response: |
      blob_client.delete(None).await?;
